<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问答页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: #f8e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .tip-text {
            font-size: 32px;
            color: #c82361;
            margin-bottom: 40px;
        }
        .btn-wrap {
            display: flex;
            gap: 30px;
            position: relative;
        }
        button {
            font-size: 20px;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.1s;
        }
        #yesBtn {
            background: #ff5896;
            color: white;
        }
        #noBtn {
            background: #888;
            color: white;
            position: absolute;
        }
        /* 全屏视频容器，默认隐藏 */
        #videoBox {
            position: fixed;
            inset: 0;
            background: #000;
            display: none;
            z-index: 9999;
        }
        #videoBox video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="tip-text">你愿意爱我吗？</div>
    <div class="btn-wrap">
        <button id="yesBtn">愿意</button>
        <button id="noBtn">不愿意</button>
    </div>

    <!-- 全屏视频容器 -->
    <div id="videoBox">
        <video loop autoplay>
            <source src="紫水鸡.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const videoBox = document.getElementById('videoBox');
        let clickCount = 0;
        const maxClick = 5;

        // 点击愿意：全屏播放视频
        yesBtn.onclick = function() {
            videoBox.style.display = 'block';
        }

        // 点击不愿意：随机移动，点5次消失
        noBtn.onclick = function() {
            clickCount++;
            if (clickCount >= maxClick) {
                noBtn.style.display = 'none';
                return;
            }
            // 随机坐标
            const maxX = window.innerWidth - noBtn.offsetWidth - 100;
            const maxY = window.innerHeight - noBtn.offsetHeight - 100;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }
    </script>
</body>
</html>
